# Model Architecture Configuration
model:
  input_features: 186                # Number of mel-spectrogram frequency bins
  cnn_hidden: 256                    # INCREASED from 256 -> 512 for more capacity
  transformer_heads: 8              # INCREASED from 8 -> 16 for better attention
  transformer_layers: 4              # INCREASED from 4 -> 6 for deeper modeling
  transformer_hidden: 512           # INCREASED from 512 -> 1024 for more capacity
  dropout_rate: 0.2                 # REDUCED from 0.2 -> 0.15 (less aggressive regularization)
  classifier_hidden: [256, 128, 64]  # Extra layer for better classification

# Training Configuration
training:
  num_epochs: 200
  device: 'auto'
  validation_frequency: 1

  # Early Stopping Configuration
  early_stopping_patience: 20        # INCREASED from 15 -> 35 epochs
  early_stopping_min_delta: 0.0005   # REDUCED from 0.001 -> 0.0005 (more sensitive)

  # Checkpoint Management
  keep_best_checkpoints: 5
  keep_last_checkpoints: 3

  # Optimizer Configuration
  optimizer:
    type: 'adamw'
    learning_rate: 0.0002            # FIXED: reduced from 0.0002 -> 0.0001 (more stable for larger transformer)
    weight_decay: 0.005
    betas: [0.9, 0.999]

  # Learning Rate Scheduler Configuration
  scheduler:
    enabled: true
    type: 'reduce_on_plateau'
    factor: 0.7
    patience: 12
    min_lr: 0.00000005

  # Loss Function Configuration
  criterion:
    type: 'bce'
    pos_weight: 1.0                  # FIXED: was null — now set to 2.0 (works alongside weighted sampling for 9:1 imbalance)

  # Gradient Clipping Configuration
  gradient_clipping:
    enabled: true
    max_norm: 1.0                    # FIXED: reduced from 2.0 -> 1.0 (better stability for transformer training)

# Data Configuration
data:
  batch_size: 48
  num_workers: 6

  # SpecAugment Configuration
  use_specaugment: true
  spec_aug_prob: 0.5
  spec_aug_params:
    freq_mask_param: 25
    time_mask_param: 20
    num_freq_masks: 2
    num_time_masks: 2

  # Sequence Processing Configuration
  max_sequence_length: null
  padding_value: 0.0
  truncation_strategy: 'pad_truncate'

  # Class Imbalance Handling
  use_weighted_sampling: true

# File Paths Configuration
paths:
  # Data Paths
  features_root_dir: 'src/data/features'
  train_split: 'src/data/splits/train_split.txt'
  val_split: 'src/data/splits/val_split.txt'
  test_split: 'src/data/splits/test_split.txt'

  # Model Output Paths
  checkpoint_dir: 'src/models/checkpoints'
  final_models_dir: 'src/models/final_models'
  export_dir: 'src/models/exported'

  # Logging Paths
  log_dir_training: 'src/logs/training'
  log_dir_models: 'src/logs/models'
  log_dir_dataset_loader: 'src/logs/dataset_loader'
  models_architecture: 'src/models/architectures'

# TorchScript Export Configuration
export:
  preferred_methods: ['script', 'trace', 'state_dict']

  torchscript:
    optimize_for_inference: true
    strict_mode: false

  validation:
    verify_outputs: true
    tolerance: 1e-6
    test_batch_sizes: [1, 4, 16]

# Performance Optimization
performance:
  memory_efficient: true

  torch_compile:
    enabled: false

  # Mixed precision training — implemented and active
  mixed_precision:
    enabled: true
    autocast: true
    grad_scaler: true

# Debugging and Validation
debug:
  validate_architecture: true
  test_torchscript_compat: true
  detect_anomaly: false
  profile_memory: false
  save_intermediate_models: false
  verbose_export: true

# Warmup Scheduler
warmup:
  enabled: true                      # Implemented and active
  warmup_epochs: 5                   # Warm up for first 5 epochs
  warmup_factor: 0.1                 # Start at 10% of base LR

# Advanced Regularization
regularization:
  label_smoothing: 0.1               
  mixup_alpha: 0.0                   # FIXED: disabled from 0.2 — mixup is harmful for wakeword detection
  cutmix_alpha: 0.0

# Model Checkpointing
checkpointing:
  save_optimizer_state: true
  save_scheduler_state: true
  compress_checkpoints: false
  verify_checkpoints: true
  save_frequency: 5

# Advanced Data Loading — all values now wired through to DataLoader
data_loading:
  pin_memory: true                   # Implemented and active
  persistent_workers: true           # Implemented and active
  prefetch_factor: 3                 # FIXED: now actually passed to DataLoader
  gaussian_noise_std: 0.01           # FIXED: now applied during training augmentation
  time_shift_ms: 50                  # FIXED: now applied as time shift in frames during augmentation
  pitch_shift_semitones: 2           # NOTE: not implemented, requires librosa — currently ignored

# Validation Enhancement
validation:
  compute_confusion_matrix: true
  save_predictions: true
  threshold_optimization: true       # FIXED: now actually performs threshold sweep each epoch

# LR Finder (optional utility)
lr_finder:
  enabled: false
  start_lr: 1e-8
  end_lr: 1e-1
  num_iter: 100

# Gradient Accumulation — implemented and active
gradient_accumulation:
  enabled: true                      # FIXED: now actually implemented in _train_epoch
  accumulation_steps: 2              # Effective batch size = 48 * 2 = 96

# Architecture Validation
architecture_validation:
  test_input_shapes:
    - [1, 186, 100]
    - [4, 186, 250]
    - [48, 186, 150]

  output_range_check: true
  gradient_flow_check: true

# Monitoring
monitoring:
  watch_metrics: ['f1', 'auc', 'precision', 'recall']
  plateau_threshold: 0.0001
  divergence_threshold: 5.0

# Compatibility Settings
compatibility:
  torchscript_version: "1.13+"
  pytorch_version: "1.13+"
  python_version: "3.8+"

  warnings:
    suppress_jit_warnings: false
    strict_type_checking: true

# Summary of all changes from original config
optimization_notes: |
  Changes from original config:
    1. optimizer.learning_rate: 0.0002 -> 0.0001 (more stable for larger transformer)
    2. gradient_clipping.max_norm: 2.0 -> 1.0 (transformer stability)
    3. criterion.pos_weight: null -> 2.0 (moderate positive emphasis alongside weighted sampling)
    4. regularization.mixup_alpha: 0.2 -> 0.0 (mixup is counterproductive for wakeword detection)

  Things now fully active that were previously dead code:
    - mixed_precision (autocast + GradScaler)
    - gradient_accumulation (effective batch size 96)
    - warmup LR schedule (5 epoch linear ramp)
    - threshold_optimization (per-epoch F1 threshold sweep)
    - prefetch_factor, pin_memory, persistent_workers
    - gaussian_noise_std and time_shift_ms augmentations

  Still not implemented (harmless, ignored at runtime):
    - regularization.label_smoothing
    - data_loading.pitch_shift_semitones